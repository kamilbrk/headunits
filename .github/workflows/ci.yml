name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npx astro check
      - name: Build
        run: npm run build
      - name: Smoke test built artifacts
        run: |
          set -e
          for path in \
            dist/index.html \
            dist/404.html \
            dist/search/index.html \
            dist/themes/ksw/index.html \
            dist/themes/zxw/index.html \
            dist/updates/ksw/index.html \
            dist/updates/zxw/index.html \
            dist/factory-settings/ksw/index.html \
            dist/factory-settings/zxw/index.html \
            dist/faq/ksw/index.html \
            dist/faq/zxw/index.html \
            dist/sitemap-index.xml \
            dist/og-image.jpg \
            dist/pagefind/pagefind-ui.js \
            dist/pagefind/pagefind-ui.css
          do
            test -s "$path" || { echo "Missing or empty: $path"; exit 1; }
          done
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: verify
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    # Serialize Pages deploys so rapid pushes don't collide on the
    # single-flight GitHub Pages deploy endpoint.
    concurrency:
      group: github-pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
